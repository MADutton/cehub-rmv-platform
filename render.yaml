services:
  - type: web
    name: assigned-case-rmv
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: assigned-case-rmv-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_MODEL
        value: gpt-4o

databases:
  - name: assigned-case-rmv-db
    plan: free
    databaseName: assigned_case_rmv
    user: assigned_case_rmv_user
