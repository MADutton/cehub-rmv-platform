services:
  - type: web
    name: cehub-rmv-platform
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cehub-rmv-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_MODEL
        value: gpt-4o

databases:
  - name: cehub-rmv-db
    plan: free
    databaseName: cehub_rmv
    user: cehub_rmv_user
